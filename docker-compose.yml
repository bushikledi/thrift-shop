services:
  # ================================
  # Infrastructure Services
  # ================================

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: thriftshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-thriftshop}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thriftshop-network

  # Redis for caching and job queues
  redis:
    image: redis:7-alpine
    container_name: thriftshop-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thriftshop-network

  # MinIO - S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: thriftshop-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - thriftshop-network

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: thriftshop-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/thriftshop --ignore-existing;
      mc anonymous set download myminio/thriftshop;
      exit 0;
      "
    networks:
      - thriftshop-network

  # MailHog - Local email testing
  mailhog:
    image: axllent/mailpit:latest
    container_name: thriftshop-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_WEB_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - thriftshop-network

  # ================================
  # Application Services
  # ================================

  # NestJS API
  api:
    build:
      context: ./thrift-shop-api
      dockerfile: Dockerfile
    container_name: thriftshop-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-thriftshop}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Required. The API rejects secrets under 64 characters at boot, so the
      # old placeholder default only produced a confusing crash. Fail fast
      # with a clear message instead. Generate: openssl rand -hex 32
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env (minimum 64 characters)}"
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # Optional: falls back to a key derived from JWT_SECRET when unset.
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      # Stripe (optional): unset means cash-on-delivery only.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: thriftshop
      S3_REGION: us-east-1
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/v1/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - thriftshop-network

  # Database migrations (run once)
  api-migrate:
    build:
      context: ./thrift-shop-api
      dockerfile: Dockerfile
      # Use the builder stage: it has the full source (incl. prisma.config.ts,
      # which supplies the datasource URL), the prisma CLI, and dotenv — the
      # production runner stage has none of these.
      target: builder
    container_name: thriftshop-api-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-thriftshop}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]
    volumes:
      # Read migrations from the working tree rather than the image. Without
      # this, pulling new migrations and running `docker compose up` silently
      # applies whatever was baked into a previously built image, and the API
      # then fails on columns that were never created.
      - ./thrift-shop-api/prisma:/app/prisma:ro
    networks:
      - thriftshop-network
    restart: "no"

  # Next.js Frontend
  app:
    build:
      context: ./thrift-shop-app
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: thriftshop-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3001",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - thriftshop-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  thriftshop-network:
    driver: bridge
